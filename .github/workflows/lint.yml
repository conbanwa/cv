name: Super-Linter

on:  # 触发条件
  push:
    branches: [ main, master ]  # 主分支推送时触发
  pull_request:
    branches: [ main, master ]  # PR提交时触发

jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest  # 使用Ubuntu环境
    
    steps:
      - name: Checkout Code  # 第一步：拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史，支持增量检查
          
      - name: Super-linter
        uses: super-linter/super-linter@v8.6.0 # x-release-please-version
        env:
          # To report GitHub Actions status checks
          DEFAULT_BRANCH: main  # 你的默认分支名
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false  # 仅检查变更文件（推荐）
          # 可选：启用特定语言检查（默认自动检测）
          # VALIDATE_PYTHON: true
          # VALIDATE_JAVASCRIPT: true
          # VALIDATE_HTML: true